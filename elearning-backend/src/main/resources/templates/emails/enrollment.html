<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to the Course!</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { color: #8b5cf6; text-align: center; font-size: 24px; margin-bottom: 20px; }
        .content { font-size: 16px; color: #333; line-height: 1.6; }
        .btn { display: inline-block; background-color: #8b5cf6; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin-top: 20px; text-align: center; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            Welcome to <span th:text="${courseName}">Course Name</span>!
        </div>
        <div class="content">
            <p>Hello <span th:text="${studentName}">Student</span>,</p>
            <p>You have successfully enrolled in <strong><span th:text="${courseName}">Course Name</span></strong>, taught by <span th:text="${teacherName}">Teacher Name</span>.</p>
            <p>Get ready to start your learning journey and explore new topics.</p>
            <div style="text-align: center;">
                <a th:href="${courseUrl}" class="btn">Go to Course</a>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 LearnAgent. All rights reserved.
        </div>
    </div>
</body>
</html>
