<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Course Alert</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { color: #ec4899; text-align: center; font-size: 24px; margin-bottom: 20px; }
        .content { font-size: 16px; color: #333; line-height: 1.6; }
        .btn { display: inline-block; background-color: #ec4899; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin-top: 20px; text-align: center; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            New Course Matching Your Interests!
        </div>
        <div class="content">
            <p>Hello <span th:text="${studentName}">Student</span>,</p>
            <p>A brand new course titled <strong><span th:text="${courseTitle}">Course Title</span></strong> has just been published!</p>
            <p>Because you're interested in <span th:text="${interestDomain}">Domain</span>, we thought you might want to check this out.</p>
            <div style="text-align: center;">
                <a th:href="${courseUrl}" class="btn">View Course</a>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 LearnAgent. All rights reserved.
        </div>
    </div>
</body>
</html>
